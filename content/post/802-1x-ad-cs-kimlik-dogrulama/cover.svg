    <circle cx="80"  cy="40"  r="22"/>
    <circle cx="0"   cy="0"   r="14" fill="#2dd4bf" stroke="none"/>
    <line x1="0"   y1="-58" x2="0"   y2="-14"/>
    <line x1="-66" y1="28"  x2="-11" y2="7"/>
    <line x1="66"  y1="28"  x2="11"  y2="7"/>
  </g>
  <text x="600" y="365" font-family="Arial Black,sans-serif" font-size="170" font-weight="900"
        fill="#0d9488" opacity="0.09" text-anchor="middle" dominant-baseline="middle">802.1X</text>
  <rect x="0" y="490" width="1200" height="140" fill="#0d9488" opacity="0.15"/>
  <rect x="0" y="490" width="1200" height="2" fill="#2dd4bf" opacity="0.5"/>
  <text x="80" y="556" font-family="Arial,sans-serif" font-size="34" font-weight="700"
