<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020f0d"/>
      <stop offset="50%" stop-color="#042f2e"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <radialGradient id="glow" cx="25%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <pattern id="net" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
