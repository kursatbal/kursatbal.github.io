      <line x1="0"  y1="40" x2="80" y2="40" stroke="#2dd4bf" stroke-width="0.5" opacity="0.12"/>
      <circle cx="40" cy="40" r="3" fill="#2dd4bf" opacity="0.18"/>
      <circle cx="0"  cy="0"  r="2" fill="#2dd4bf" opacity="0.12"/>
      <circle cx="80" cy="0"  r="2" fill="#2dd4bf" opacity="0.12"/>
      <circle cx="0"  cy="80" r="2" fill="#2dd4bf" opacity="0.12"/>
      <circle cx="80" cy="80" r="2" fill="#2dd4bf" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#net)"/>
  <ellipse cx="300" cy="250" rx="480" ry="300" fill="url(#glow)"/>
  <!-- Network topology icon -->
  <g transform="translate(950,300)" opacity="0.09" stroke="#2dd4bf" fill="none" stroke-width="5">
